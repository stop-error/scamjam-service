syntax = "proto3";

package alerts_proto;

option go_package = ".";

service DnsAlertService {
  rpc Dns(stream DnsAlert) returns ( stream DnsAlertReply);
}

service UiAlertService {
  rpc Ui(stream UiAlert) returns (stream UiAlertReply);
}

message DnsAlert {
  string hostname = 1;
  string source = 2;
  string category = 3;
}

message DnsAlertReply {
   bool ack = 1;
}

message UiAlert {
  string threatCategory = 1;
  string threatSubCategory = 2;
  string threatEntityName = 3;
  string threatIntelSource = 4;
}

message UiAlertReply {
  string userAction = 1;
}